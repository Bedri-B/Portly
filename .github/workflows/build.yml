name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: docker-global-windows-amd64
            exe: docker-global.exe
            sep: ";"
          - os: ubuntu-latest
            artifact: docker-global-linux-amd64
            exe: docker-global
            sep: ":"
          - os: macos-latest
            artifact: docker-global-macos-arm64
            exe: docker-global
            sep: ":"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: pip install pyinstaller

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web dashboard
        working-directory: web
        run: npm run build

      - name: Build executable
        run: >
          python -m PyInstaller
          --noconfirm --onefile --console
          --name docker-global
          --add-data "web/dist${{ matrix.sep }}web"
          --distpath dist
          app.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.exe }}
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/docker-global-windows-amd64/docker-global.exe release/docker-global-windows-amd64.exe
          cp artifacts/docker-global-linux-amd64/docker-global release/docker-global-linux-amd64
          cp artifacts/docker-global-macos-arm64/docker-global release/docker-global-macos-arm64
          chmod +x release/docker-global-linux-amd64 release/docker-global-macos-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
