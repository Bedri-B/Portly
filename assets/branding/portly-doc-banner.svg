<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="480" viewBox="0 0 1280 480" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0a14"/>
      <stop offset="1" stop-color="#0f0f23"/>
    </linearGradient>
    <linearGradient id="arch" x1="60" y1="40" x2="260" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="gA" cx="200" cy="200" r="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="480" fill="url(#bg)"/>
  <rect width="1280" height="480" fill="url(#gA)"/>
  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#818cf8">
    <line x1="0" y1="80" x2="1280" y2="80"/><line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/><line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="480"/><line x1="320" y1="0" x2="320" y2="480"/>
    <line x1="480" y1="0" x2="480" y2="480"/><line x1="640" y1="0" x2="640" y2="480"/>
    <line x1="800" y1="0" x2="800" y2="480"/><line x1="960" y1="0" x2="960" y2="480"/>
    <line x1="1120" y1="0" x2="1120" y2="480"/>
  </g>
  <!-- Large portal mark -->
  <g transform="translate(80 60)">
    <path d="M72 320V136C72 82.981 115.981 40 168 40C220.019 40 264 82.981 264 136V320" stroke="url(#arch)" stroke-width="22" stroke-linecap="round"/>
    <line x1="50" y1="320" x2="286" y2="320" stroke="url(#arch)" stroke-width="22" stroke-linecap="round"/>
    <!-- Flow dots -->
    <circle cx="168" cy="148" r="16" fill="#38bdf8"/>
    <circle cx="168" cy="200" r="13" fill="#818cf8" opacity="0.8"/>
    <circle cx="168" cy="246" r="10" fill="#a78bfa" opacity="0.6"/>
    <!-- Side nodes -->
    <circle cx="20" cy="148" r="12" fill="#38bdf8" opacity="0.6"/>
    <circle cx="20" cy="200" r="12" fill="#34d399" opacity="0.6"/>
    <circle cx="316" cy="148" r="12" fill="#fbbf24" opacity="0.6"/>
    <circle cx="316" cy="200" r="12" fill="#f87171" opacity="0.6"/>
    <line x1="32" y1="148" x2="72" y2="148" stroke="#38bdf8" stroke-width="4" opacity="0.3" stroke-linecap="round"/>
    <line x1="32" y1="200" x2="72" y2="200" stroke="#34d399" stroke-width="4" opacity="0.3" stroke-linecap="round"/>
    <line x1="264" y1="148" x2="304" y2="148" stroke="#fbbf24" stroke-width="4" opacity="0.3" stroke-linecap="round"/>
    <line x1="264" y1="200" x2="304" y2="200" stroke="#f87171" stroke-width="4" opacity="0.3" stroke-linecap="round"/>
  </g>
  <!-- Typography -->
  <text x="500" y="195" fill="#ececf1" font-size="88" font-weight="700" font-family="system-ui, -apple-system, Segoe UI, sans-serif" letter-spacing="-2">Portly</text>
  <text x="504" y="240" fill="#52525b" font-size="22" font-weight="500" font-family="system-ui, -apple-system, Segoe UI, sans-serif" letter-spacing="6">PORTLESS LOCAL PROXY</text>
  <text x="504" y="295" fill="#71717a" font-size="20" font-weight="400" font-family="system-ui, -apple-system, Segoe UI, sans-serif">Access any local service by name instead of port number.</text>
  <text x="504" y="325" fill="#52525b" font-size="17" font-weight="400" font-family="system-ui, -apple-system, Segoe UI, sans-serif">Docker containers, dev servers, APIs — all at clean *.localhost URLs.</text>
  <!-- Accent dots -->
  <g transform="translate(504 365)">
    <circle cx="0" cy="0" r="5" fill="#38bdf8" opacity="0.7"/>
    <circle cx="20" cy="0" r="5" fill="#34d399" opacity="0.7"/>
    <circle cx="40" cy="0" r="5" fill="#fbbf24" opacity="0.7"/>
    <circle cx="60" cy="0" r="5" fill="#f87171" opacity="0.7"/>
    <line x1="80" y1="0" x2="400" y2="0" stroke="#27272a" stroke-width="1"/>
  </g>
